<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LUVE 随心而动</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-calm: linear-gradient(135deg, #DBEAFE 0%, #D4E4CD 100%);
            --bg-prog: linear-gradient(135deg, #F8E3C2 0%, #ef8d58 100%);
            --bg-dyn: linear-gradient(135deg, #F2BEC3 0%, #DE8A8B 100%);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --text-main: #333333;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -48%) scale(1); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
            50% { transform: translate(-50%, -52%) scale(1.02); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        }

        @keyframes pulse-border {
            0% { border-color: rgba(255,255,255,0.3); }
            50% { border-color: rgba(255,255,255,0.6); }
            100% { border-color: rgba(255,255,255,0.3); }
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: "PingFang SC", sans-serif;
            background: #e0f2f1;
            transition: background 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* #canvas-bg { position: fixed; top: 0; left: 0; z-index: 1; filter: blur(2px); } */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: 1; filter: blur(0.6px); }
        .glass-card {
            position: absolute; top: 50%; left: 50%;
            width: 340px; padding: 50px 40px; z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            text-align: center;
            animation: breathe 8s ease-in-out infinite, pulse-border 4s infinite;
        }
        .status-tag { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            background: rgba(255,255,255,0.3); font-size: 12px; 
            color: var(--text-main); margin-bottom: 25px;
        }
        .bgm-display { 
            font-size: 38px; font-weight: 200; margin: 15px 0; 
            color: var(--text-main); transition: opacity 0.5s;
        }

        h3 { font-weight: 400; font-size: 14px; color: var(--text-main); opacity: 0.6; margin-bottom: 30px; letter-spacing: 2px; }
        #sync-btn { 
            margin-top: 30px; border: none; padding: 14px 40px; border-radius: 30px; 
            background: var(--text-main); color: white; cursor: pointer; 
            transition: all 0.4s ease; font-weight: 500;
        }
        .running-pulse { animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="glass-card">
    <div id="style-tag" class="status-tag">📡 系统就绪</div>
    <div id="bgm-text" class="bgm-display">---</div>
    <h3 id="song-title">LUVE 情动球</h3>
    <audio id="audio" loop></audio>
    <button id="sync-btn" onclick="startSync()">轻触唤醒，随心而动</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, blob, blobMat;
let currentTheme = 'calm';
let isInteracted = false;
let target = 'calm';

const audio = document.getElementById('audio');
const bgmText = document.getElementById('bgm-text');

// 1. 先定义辅助函数 (必须放在 themeMap 之前)
const getCSSVar = (name) => {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
};


const themeMap = {
    dyn: { bg: 'linear-gradient(135deg, #F2BEC3 0%, #DE8A8B 100%)', label: '🔥 Rising Crest', color: 0xed5742, bgm: '/static/bgm/donggan/dont-stop.mp3' },
    calm: { bg: 'linear-gradient(135deg, #DBEAFE 0%, #D4E4CD 100%)', label: '🍃 Calm Awakening', color: 0x3aaeff, bgm: '/static/bgm/pingjing/float-sturling.mp3' },
    prog: { bg: 'linear-gradient(135deg, #F8E3C2 0%, #ef8d58 100%)', label: '🌅 Warm Bloom', color: 0xf56e01, bgm: '/static/bgm/jianjin/timing.mp3' },

};
function formatBGMName(path) {
    return "🎶 " + path.split('/').pop().split('.')[0].replace(/-/g, ' ');
}

// 音量渐变函数
// 优化后的音量渐变函数
function fadeAudio(targetVolume, duration = 800) {
    const startVol = audio.volume;
    const startTime = performance.now();
    
    const animate = (now) => {
        const progress = Math.min((now - startTime) / duration, 1);
        // 计算原始音量值
        let rawVolume = startVol + (targetVolume - startVol) * progress;
        
        // 【关键修复】使用 Math.max(0, Math.min(1, ...)) 确保值在 [0, 1] 之间
        audio.volume = Math.max(0, Math.min(1, rawVolume));

        if (progress < 1) {
            requestAnimationFrame(animate);
        }
    };
    requestAnimationFrame(animate);
}

// 核心更新函数
window.updateUI = function(val) {

    if (val === 3) {
        target = 'calm';
    } else if (val === 1 || val === 2) { 
        target = 'prog';
    } else if (val === 0) {
        target = 'dyn';
    }

    if (target !== currentTheme) {
        currentTheme = target;
        const config = themeMap[target];

        // 视觉切换
        document.body.style.background = config.bg;
        document.getElementById('style-tag').innerText = config.label;
        if (blobMat) blobMat.color.setHex(config.color);
        
        // 文字切换
        bgmText.style.opacity = 0;
        setTimeout(() => {
            bgmText.innerText = formatBGMName(config.bgm);
            bgmText.style.opacity = 1;
        }, 400);

        // 音乐切换（带呼吸感 Fade）
        if (isInteracted) {
            fadeAudio(0, 400); // 渐隐
            setTimeout(() => {
                audio.src = config.bgm;
                audio.load();
                audio.play().then(() => fadeAudio(0.6, 1000)); // 渐显
            }, 450);
        } else {
            audio.src = config.bgm;
        }
    }
};

window.startSync = function() {
    const btn = document.getElementById('sync-btn');
    if (!isInteracted || audio.paused) {
        isInteracted = true;
        audio.volume = 0;
        audio.play().then(() => {
            fadeAudio(0.6, 1200);
            btn.innerText = "正在沉浸";
            btn.style.background = "#4CAF50";
            btn.classList.add('running-pulse');
        }).catch(e => console.log("等待交互中..."));
    } else {
        fadeAudio(0, 400);
        setTimeout(() => {
            audio.pause();
            btn.innerText = "沉浸褪去";
            btn.style.background = "#666";
            btn.classList.remove('running-pulse');
        }, 450);
    }
};

window.addEventListener('resize', () => {
    // 更新相机比例
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    // 更新渲染器大小
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // 保持高分屏清晰度
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

function initVisuals() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    // camera.position.set(0, 1, 5);
    camera.position.set(0, 3, 5);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // blobMat = new THREE.MeshPhongMaterial({ color: 0x40E0D0, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
    // 修改后（更亮、更鲜艳）

    // 添加下面这一行：适配高分辨率屏幕
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 

    blobMat = new THREE.MeshPhongMaterial({ 
        color: 0x40E0D0, 
        transparent: true, 
        opacity: 0.6,       // 稍微提高透明度
        shininess: 70,     // 增加反光感
        emissive: 0x666666, // 添加微弱的自发光，让暗部不那么黑
        side: THREE.DoubleSide 
    });
    
    /* blobMat = new THREE.MeshBasicMaterial({ 
        color: 0x40E0D0, 
        transparent: true, 
        opacity: 0.6,       // 稍微提高透明度
        shininess: 100,     // 增加反光感
        emissive: 0x666666, // 添加微弱的自发光，让暗部不那么黑
        side: THREE.DoubleSide 
    }); */

    blob = new THREE.Mesh(new THREE.PlaneGeometry(100, 10, 128, 128), blobMat);
    blob.rotation.x = -Math.PI / 2.5;
    scene.add(blob);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(0, 15, 5);
    scene.add(light);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if (blob) {
        const time = Date.now() * 0.001;
        const pos = blob.geometry.attributes.position;
        for(let i=0; i<pos.count; i++) {
            let x = pos.getX(i);
            let amp = currentTheme === 'dyn' ? 1 : (currentTheme === 'prog' ? 0.6 : 0.3);
            pos.setZ(i, Math.sin(x*0.7 + time) * amp);
        }
        pos.needsUpdate = true;
    }
    renderer.render(scene, camera);
}

// --- 插入以下 Socket.io 监听代码 ---
const socket = io("http://127.0.0.1:5001"); // 初始化连接

socket.on('connect', () => {
    console.log("✅ 交互终端已连接至服务器");
    document.getElementById('style-tag').innerText = "📡 实时同步中";
});

// 监听后端发来的 hardware_update 事件
socket.on('hardware_update', function(msg) {
    const level = msg.level; 
    console.log("📥 收到硬件层级指令:", level);
    
    // 调用 V15 中已有的 updateUI 函数进行视觉和音乐切换
    if (window.updateUI) {
        window.updateUI(level);
    }
});

window.onload = () => {
    initVisuals();
    const initialVal = 1; // 初始值
    window.updateUI(initialVal); // 直接调用更新函数设置初始状态

    const currentConfig = themeMap[currentTheme];
    bgmText.innerText = formatBGMName(currentConfig.bgm);
    bgmText.style.opacity = 1;
};
</script>
</body>
</html>
